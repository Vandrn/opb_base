version: '3.8'

services:
  # Backend: Laravel API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opb-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=bigquery
    volumes:
      - ./backend:/app
      - /app/vendor
      - /app/storage
    networks:
      - opb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Frontend: React + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opb-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - opb-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  opb-network:
    driver: bridge
